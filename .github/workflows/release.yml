name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        if: matrix.os == 'ubuntu-latest'
        run: cargo fmt --check
      - name: Build
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Package check
        if: matrix.os == 'ubuntu-latest'
        run: cargo package --allow-dirty --no-verify

  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  release-binaries:
    name: Release Binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            binary_name: notebooklm
            artifact_name: notebooklm-linux-x86_64
          - os: windows-latest
            binary_name: notebooklm.exe
            artifact_name: notebooklm-windows-x86_64.exe
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --bin notebooklm
      - name: Archive binary
        shell: bash
        run: |
          mkdir -p dist
          cp target/release/${{ matrix.binary_name }} dist/${{ matrix.artifact_name }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact_name }}
