name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
      - name: Format check
        run: cargo fmt --check
      - name: Build
        run: cargo check --all-targets
      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --all-targets
      - name: Package check
        run: cargo package --allow-dirty --no-verify

  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: ${{ secrets.CARGO_REGISTRY_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Publish crate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish --locked

  release-binaries:
    runs-on: ubuntu-latest
    needs: verify
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Build release binary
        run: cargo build --release --bin notebooklm
      - name: Archive binary
        run: |
          mkdir -p dist
          cp target/release/notebooklm dist/notebooklm-linux-x86_64
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/notebooklm-linux-x86_64
